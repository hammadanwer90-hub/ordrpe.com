  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #00c65e;
      --bg: #080808;
      --bg2: #121212;
      --border: rgba(255,255,255,0.10);
      --border-light: rgba(255,255,255,0.18);
      --text: #ffffff;
      --muted2: #b0b0b0;
      --text-muted: #a0a0a0;
      --text-faint: #888888;
      --nav-bg: rgba(8,8,8,0.92);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f9f9f7;
        --bg2: #f2f2f0;
        --border: rgba(0,0,0,0.10);
        --border-light: rgba(0,0,0,0.18);
        --text: #0d0d0d;
        --muted2: #555555;
        --text-muted: #666666;
        --text-faint: #777777;
        --nav-bg: rgba(249,249,247,0.92);
      }
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* ── INTRO FLASH ── */
    #intro-flash {
      position: fixed; inset: 0;
      background: #080808;
      z-index: 99999;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #intro-flash.out { opacity: 0; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo-wrap { display: flex; align-items: center; }
    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text);
    }
    .logo-text em { font-style: normal; color: var(--green); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-pill {
      font-size: 11px; font-weight: 500;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 9px 22px;
      border: 1px solid var(--border-light); border-radius: 100px;
      color: var(--text); transition: background 0.25s, border-color 0.25s;
    }
    .nav-pill:hover { background: var(--text); color: #000; border-color: var(--text); }
    .nav-pill.cta { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
    .nav-pill.cta:hover { background: #00e06a; border-color: #00e06a; }

    /* ── PAGE ── */
    .page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 100px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    .page::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,198,94,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .err-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 300;
      line-height: 1;
      color: var(--green);
      letter-spacing: -4px;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s ease forwards;
    }
    .err-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 300;
      color: var(--text);
      margin-top: 12px;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s ease forwards;
    }
    .err-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 380px;
      margin-bottom: 44px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s ease forwards;
    }
    .err-actions {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s ease forwards;
    }
    .btn-home {
      background: var(--green); color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 15px 32px; border-radius: 100px;
      transition: background 0.2s, transform 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-home:hover { background: #00e06a; transform: translateY(-1px); }
    .btn-wa {
      border: 1px solid var(--border-light);
      color: var(--muted2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 400;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 15px 32px; border-radius: 100px;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-wa:hover { border-color: var(--green); color: var(--text); transform: translateY(-1px); }

    /* Floating package icon */
    .err-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.7s 0.05s ease forwards, float 4s ease-in-out 0.8s infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ── FOOTER LINE ── */
    .err-footer {
      position: absolute; bottom: 32px;
      font-size: 11px; color: var(--text-faint); letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .err-actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- Quick fade-in overlay -->
  <div id="intro-flash"></div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo-wrap">
      <span class="logo-text">SHOPP<em>I</em>SH</span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-pill">Home</a>
      <a href="https://wa.me/923143442661" class="nav-pill cta" target="_blank" rel="noopener">Join Now</a>

  </nav>

  <!-- 404 CONTENT -->
  <div class="page">
    <div class="err-icon" aria-hidden="true">

    <div class="err-actions">

          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        WhatsApp Us
      </a>
    </div>
    <p class="err-footer">© 2026 Shoppish · Everything America has. Delivered to your door in Pakistan.</p>
  </div>

  <script>
    // Fade out the intro flash
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('intro-flash').classList.add('out');
        setTimeout(() => document.getElementById('intro-flash').remove(), 600);
      }, 80);
    });
  </script>

  <div id="page-transition" class="page-transition"></div>
  <script>
    (function() {
      var overlay = document.getElementById('page-transition');
      window.addEventListener('pageshow', function() {
        setTimeout(function() { overlay.style.opacity = '0'; }, 50);
      });
      document.addEventListener('click', function(e) {
        var a = e.target.closest('a[href]');
        if (!a) return;
        var href = a.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('tel')) return;
        if (a.target === '_blank') return;
        e.preventDefault();
        overlay.style.pointerEvents = 'all';
        overlay.style.opacity = '1';
        setTimeout(function() { window.location.href = href; }, 320);
      });
    })();
  </script>

</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Desktop/ordrpe.index
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Desktop/ordrpe.index/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
